<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" role="img" width="720" height="350" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Knowledge-graph extraction quality: fine-tuned Qwen3.5-0.8B closes ~86% of the base-model to Gemini 2.5 Flash Lite gap</title>
  <!-- card -->
  <rect x="1" y="1" width="718" height="348" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <!-- heading -->
  <text x="28" y="42" fill="#e2e8f0" font-size="19" font-weight="700">Knowledge-graph extraction quality</text>
  <text x="28" y="64" fill="#94a3b8" font-size="13">Mean reward on a fixed 200-item test set (unparseable outputs scored -1.0) &#183; higher is better</text>

  <!-- axis baseline 0.0 and gridline at 1.0 -->
  <!-- plot area: score 0..1 maps x 175..690 (width 515) -->
  <line x1="175" y1="96" x2="175" y2="272" stroke="#334155" stroke-width="1.5"/>
  <text x="175" y="292" fill="#64748b" font-size="11" text-anchor="middle">0.0</text>
  <text x="432" y="292" fill="#64748b" font-size="11" text-anchor="middle">0.5</text>
  <text x="690" y="292" fill="#64748b" font-size="11" text-anchor="middle">1.0</text>

  <!-- Gemini reference dashed line at 0.858 -> x = 175 + 0.858*515 = 617 -->
  <line x1="617" y1="92" x2="617" y2="276" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.8"/>
  <text x="613" y="88" fill="#a78bfa" font-size="11" text-anchor="end" font-weight="600">Gemini reference</text>

  <!-- Bar 1: pretrained 0.422 -> width 217 -->
  <text x="160" y="126" fill="#cbd5e1" font-size="13" text-anchor="end">Qwen3.5-0.8B</text>
  <text x="160" y="141" fill="#64748b" font-size="11" text-anchor="end">(pretrained)</text>
  <rect x="175" y="107" width="217" height="34" rx="4" fill="#475569"/>
  <text x="400" y="129" fill="#e2e8f0" font-size="13" font-weight="700">0.422</text>

  <!-- Bar 2: GRPO run 5 0.796 -> width 410 (hero) -->
  <text x="160" y="180" fill="#e2e8f0" font-size="13" text-anchor="end" font-weight="700">Tiny Graph Extractor</text>
  <text x="160" y="195" fill="#94a3b8" font-size="11" text-anchor="end">0.8B + GRPO</text>
  <rect x="175" y="161" width="410" height="34" rx="4" fill="#34d399"/>
  <text x="593" y="183" fill="#34d399" font-size="13" font-weight="700">0.796</text>

  <!-- Bar 3: Gemini 0.858 -> width 442 -->
  <text x="160" y="234" fill="#cbd5e1" font-size="13" text-anchor="end">Gemini 2.5</text>
  <text x="160" y="249" fill="#64748b" font-size="11" text-anchor="end">Flash Lite</text>
  <rect x="175" y="215" width="442" height="34" rx="4" fill="#a78bfa"/>
  <text x="625" y="237" fill="#a78bfa" font-size="13" font-weight="700">0.858</text>

  <!-- callout -->
  <text x="28" y="325" fill="#e2e8f0" font-size="13" font-weight="600">~86% of the base &#8594; Gemini gap closed</text>
  <text x="360" y="325" fill="#94a3b8" font-size="13">&#183; nearly 2&#215; the pretrained score &#183; matches Gemini on parse reliability (8/200)</text>
</svg>
